site_name: Leviathan Agent Platform
site_description: Документация агентной системы
site_url: https://lidenal85-blip.github.io/leviathan-docs/
theme:
  name: material
  language: ru
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
nav:
  - Главная: index.md
  - Быстрый старт:
    - Мастер-промт: MASTER_PROMPT.md
    - Чек-лист: MASTER_CHECKLIST.md
    - Индекс: INDEX.md
  - Документация:
    - Манифест 5.0.0: context/MANIFEST_5.0.0.md
    - Анализ системы: context/MY_SYSTEM_ANALYSIS.md
    - План объединения: context/COMPREHENSIVE_UNIFICATION_PLAN.md
    - Слияние агентов: context/AGENT_MERGE_PLAN.md
